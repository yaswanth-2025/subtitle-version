name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Extract version from tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "APP_VER=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            echo "APP_VER=${{ inputs.tag || 'manual-run' }}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller>=6.7,<6.8" "pefile!=2024.8.26"
          pip install -r requirements.txt

      - name: Verify static frontend exists
        run: |
          if (-not (Test-Path "static\index.html")) {
            Write-Error "static\index.html not found!"
            exit 1
          }
          Write-Output "Frontend found at static\index.html"

      - name: Build Windows executable
        run: pyinstaller srt_compare_app.spec --clean --noconfirm

      - name: Debug - Show build output
        run: |
          Write-Output "=== Contents of dist directory ==="
          if (Test-Path "dist") {
            Get-ChildItem -Path "dist" -Recurse | ForEach-Object {
              Write-Output "  $($_.FullName)"
            }
          } else {
            Write-Output "dist directory does not exist!"
          }

      - name: Verify executable
        run: |
          $exePath = Get-ChildItem -Path "dist" -Filter "*.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exePath) {
            Write-Error "No executable found in dist/"
            exit 1
          }
          $size = (Get-Item $exePath).Length / 1MB
          Write-Output "Executable: $exePath ($([math]::Round($size, 1)) MB)"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SRT-Compare-Windows
          path: dist/

      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: |
          cd dist
          # For onefile mode the exe is directly in dist/
          $exeFiles = Get-ChildItem -Filter "*.exe"
          if ($exeFiles) {
            Write-Output "Creating zip from dist/ (onefile build)"
            Compress-Archive -Path ".\*" -DestinationPath ".\SRT-Compare-Windows-${{ env.APP_VER }}.zip"
          } else {
            # Fallback: check subdirectories (onedir mode)
            $targetDir = Get-ChildItem -Directory | Where-Object {
              (Get-ChildItem -Path $_.FullName -Filter "*.exe" -Recurse).Count -gt 0
            } | Select-Object -First 1
            if ($targetDir) {
              Write-Output "Creating zip from directory: $($targetDir.Name)"
              Compress-Archive -Path ".\$($targetDir.Name)" -DestinationPath ".\SRT-Compare-Windows-${{ env.APP_VER }}.zip"
            } else {
              Write-Error "No executable files found to package"
              Get-ChildItem -Recurse
              exit 1
            }
          }

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', env.APP_VER) || github.ref_name }}
          files: dist/SRT-Compare-Windows-${{ env.APP_VER }}.zip
          name: "SRT Compare ${{ env.APP_VER }}"
          generate_release_notes: true
